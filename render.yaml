services:
  - type: web
    name: smart-farming-ai
    env: python
    runtime: python
    pythonVersion: 3.11.9
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120 --log-level debug
    plan: free
    envVars:
      - key: FLASK_DEBUG
        value: false
      - key: PYTHONUNBUFFERED
        value: "1"
    healthCheckPath: /health
